<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1st Monthsary 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: url('tulips.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(40, 0, 70, 0.5);
    backdrop-filter: blur(3px);
    z-index: 0;
}

/* ENVELOPE */
.envelope {
    position: relative;
    width: 300px;
    height: 200px;
    background: #d8b4f8;
    cursor: pointer;
    z-index: 2;
}

.flap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-bottom: 100px solid #c084fc;
    top: -100px;
    transition: 0.8s;
}

.open .flap {
    transform: rotateX(180deg);
    top: -100px;
}

/* LETTER */
.letter {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: #fffaf5;
    width: 90%;
    max-width: 350px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: #4b2e5e;
    z-index: 1;
    transition: 0.8s;
}

.open .letter {
    transform: translateX(-50%) scale(1);
    top: -220px;
}

h1 {
    text-align: center;
    font-size: 20px;
    color: #7b3fa0;
}

p {
    font-size: 14px;
    line-height: 1.6;
}

/* IMAGE */
.photo {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
}

/* typing */
.typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()" id="env">
    <div class="flap"></div>

    <div class="letter">
        <h1>Happy 1st Monthsary 💜</h1>
        <p id="text" class="typing"></p>
        
        <!-- YOUR PICTURE HERE -->
        <img src="us.jpg" class="photo">
    </div>
</div>

<script>
function openEnvelope() {
    document.getElementById("env").classList.add("open");
    setTimeout(typeText, 800);
}

const messages = [
    "Hi BABYY,",
    "Happy 1st monthsary 💜,",
   "This first month with you is so special to me, and I cherish every moment we spend together.",
    "Every moment with you feels different — mas magaan, mas totoo, mas masaya. Kahit simpleng usapan lang natin, or kahit wala tayong ginagawa, basta kasama kita, sapat na.",
    "Thank you for being my peace in this chaotic world. Thank you for choosing me, for staying, and for loving me the way you do.",
    "Hindi man perpekto yung relationship natin, may pag aaway pero sigurado ako sa’yo. Sigurado ako na gusto kitang piliin araw-araw",
    "This is just our first month, pero sana ito na yung simula ng mas mahaba pa nating kwento.",
    "I love you more than words can explain 💜",
    "— Future mo"
];

let i = 0;
let j = 0;
let currentText = "";

function typeText() {
    if (i < messages.length) {
        if (j < messages[i].length) {
            currentText += messages[i].charAt(j);
            document.getElementById("text").innerHTML = currentText;
            j++;
            setTimeout(typeText, 35);
        } else {
            currentText += "<br><br>";
            j = 0;
            i++;
            setTimeout(typeText, 500);
        }
    }
}
</script>

</body>
</html>
